name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Inject build-time configuration so the produced debug APK is fully
    # working against a real backend rather than the emulator-only defaults
    # baked into the source tree.
    #
    # These are read by `android/build.gradle.kts` via project properties
    # (`ORG_GRADLE_PROJECT_<NAME>` env vars become Gradle properties named
    # `<NAME>`).  Configure them under the repository's
    # Settings → Secrets and variables → Actions:
    #   - `vars.SERVER_URL`           – signalling server base URL
    #   - `vars.INVITE_LINK_BASE_URL` – base URL used in invite deep links
    #   - `vars.INVITE_LINK_HOST`     – host used for the deep-link intent filter
    # Use `secrets.*` instead of `vars.*` for any value that must not be
    # exposed in logs.  When unset, the in-source defaults are used so that
    # forks and local builds keep working.
    env:
      ORG_GRADLE_PROJECT_SERVER_URL: ${{ vars.SERVER_URL }}
      ORG_GRADLE_PROJECT_INVITE_LINK_BASE_URL: ${{ vars.INVITE_LINK_BASE_URL }}
      ORG_GRADLE_PROJECT_INVITE_LINK_HOST: ${{ vars.INVITE_LINK_HOST }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Deterministic debug signing ─────────────────────────────────────────
      # When `secrets.DEBUG_KEYSTORE_BASE64` is configured in the repository,
      # the keystore is decoded here and the four signing env vars are written
      # to $GITHUB_ENV so every subsequent Gradle step picks them up
      # automatically.  This ensures the debug APK always carries the same
      # SHA-256 certificate fingerprint, making it stable for use in
      # `ANDROID_APP_SHA256_FINGERPRINTS` on the server side.
      #
      # Required repository secrets (all must be set together):
      #   DEBUG_KEYSTORE_BASE64    – base64-encoded .jks / .keystore file
      #   DEBUG_KEYSTORE_PASSWORD  – store password
      #   DEBUG_KEY_ALIAS          – key alias inside the keystore
      #   DEBUG_KEY_PASSWORD       – key password
      #
      # When none of these secrets are set the step is skipped entirely and
      # the signing env vars are never exported, so both build steps below fall
      # back to the default Android debug keystore.  Forks and pull requests
      # from external contributors keep working without any secrets configured.
      - name: Decode debug keystore
        if: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="${{ github.workspace }}/debug.keystore"
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "DEBUG_KEYSTORE_PATH=$KEYSTORE_PATH"          >> "$GITHUB_ENV"
          echo "DEBUG_KEYSTORE_PASSWORD=${{ secrets.DEBUG_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "DEBUG_KEY_ALIAS=${{ secrets.DEBUG_KEY_ALIAS }}"           >> "$GITHUB_ENV"
          echo "DEBUG_KEY_PASSWORD=${{ secrets.DEBUG_KEY_PASSWORD }}"     >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew :android:assembleDebug

      - name: Run unit tests
        run: ./gradlew :android:testDebugUnitTest

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 7
